name: Daily Briefing Bot

on:
  # 自动调度
  schedule:
    # UTC 21:15
    # 冬令时 (Nov-Mar): 美东 16:15 (闭市后 15m) -> 完美
    # 夏令时 (Mar-Nov): 美东 17:15 (闭市后 1h15m) -> 安全
    # 每天运行 (包含周末，因为你需要天气日报)
    - cron: '15 21 * * *'
    
  # 允许手动在 GitHub 网页点击按钮触发 (方便调试)
  workflow_dispatch:

jobs:
  run-daily-bot:
    runs-on: ubuntu-latest

    # 允许 keep-alive 步骤推送空提交，重置 GitHub 60 天闲置定时器
    permissions:
      contents: write

    # 设置超时防止卡死，5分钟足矣
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 开启缓存加速依赖安装

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Briefing Script
        # 将 GitHub Secrets 注入为环境变量
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          # 隐私位置信息
          LATITUDE: ${{ secrets.LATITUDE }}
          LONGITUDE: ${{ secrets.LONGITUDE }}
          LOCATION_NAME: ${{ secrets.LOCATION_NAME }}
        run: python -m src.main

      # 防止 GitHub 因 60 天无活动自动禁用定时工作流。
      # 仅在最近一次提交超过 50 天时推送一个空 commit (低于 60 天阈值, 留有缓冲)。
      - name: Keep workflow alive
        if: github.event_name == 'schedule'
        run: |
          LAST_COMMIT_TS=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          DAYS=$(( (NOW - LAST_COMMIT_TS) / 86400 ))
          echo "Last commit was $DAYS days ago."
          if [ "$DAYS" -ge 50 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keep workflow alive"
            git push
          fi